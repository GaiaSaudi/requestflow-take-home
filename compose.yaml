services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-requestflow}
      POSTGRES_USER: ${POSTGRES_USER:-requestflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-requestflow-local}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 20
    ports:
      - "5433:5432"
    volumes:
      - requestflow-db:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://requestflow:requestflow-local@db:5432/requestflow}
    command: >-
      sh -c "uv run alembic upgrade head &&
      uv run python -m app.seed &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - ./backend/tests:/app/tests

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
    command: npm run dev -- --hostname 0.0.0.0
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src

volumes:
  requestflow-db:
